brain:
  repo_root: .
daemon:
  host: 127.0.0.1
  port: 8765
  auto_start: true
  python_command: python
indexing:
  debounce_ms: 2500
  max_cpu_cores: 1
  initial_index_parallelism: 2
  incremental_index_parallelism: 1
  batch_size_files: 10
  batch_sleep_ms: 250
  pause_when_system_cpu_above: 75
  pause_when_memory_above_mb: 2048
  pause_during_build: true
  pause_when_on_battery: true
hash_scan:
  enabled: true
  interval_seconds: 600
  max_files_per_batch: 200
  batch_sleep_ms: 500
embedding:
  provider: mock
  model: local-code-embedding-small
  batch_size_chunks: 16
  max_chunk_tokens: 800
  only_embed_changed_chunks: true
  lazy_load_model: true
  unload_after_idle_minutes: 15
  base_url: ""
  api_key_env: OPENAI_API_KEY
retrieval:
  max_context_tokens: 25000
  lexical_top_k: 20
  vector_top_k: 30
  symbol_top_k: 20
  rerank_top_k: 12
  include_tests: true
  include_callers: true
  include_callees: true
  include_config: true
  include_git_diff: true
ai:
  provider: none
  base_url: ""
  api_key_env: ""
  model: ""
  temperature: 0.1
contextVerifier:
  enabled: true
  provider: openrouter
  baseUrl: https://openrouter.ai/api/v1
  model: qwen/qwen3-coder:free
  apiKeyEnv: OPENROUTER_API_KEY
  maxAttempts: 3
  minConfidence: 0.75
  explainWithVerifier: true
apply:
  require_patch_approval: true
  run_tests_after_apply: true
  test_command: ""
